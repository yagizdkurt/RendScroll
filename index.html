<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RendScroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Alegreya+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/style.css">
<link rel="stylesheet" href="src/editor/editor.css">
<link rel="stylesheet" href="src/printer/printer.css">
<link rel="stylesheet" href="src/debug/debugPanel.css">
</head>
<body>
  <aside id="sidebar">
    <img class="sidebar-brand" src="src/STDImages/RendScroll2.png" alt="RendScroll">
    <button id="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true">☰</button>
    <nav id="nav"></nav>
    <section id="options" class="options" aria-label="Options"></section>
  </aside>
  <div id="main-area">
    <header id="topbar">
      <div id="topbar-primary">
        <button id="new-page-button" class="topbar-action topbar-new-page" type="button">+ New Page</button>
      </div>
      <div id="topbar-tools"></div>
    </header>
    <main id="reader">
      <article id="page" class="page"></article>
    </main>
  </div>
  <script src="src/vendor/marked.min.js"></script>
  <script src="src/rendererOptions.js"></script>
  <script src="src/utils/text.js"></script>
  <script src="src/utils/dom.js"></script>
  <script src="src/utils/markdown.js"></script>
  <!-- RendScroll structural parser: canonical model consumed by the editor now
       and (Phase 2) the renderer. Must load before outline.js / cardSchemas.js. -->
  <script src="src/parser/rendscrollParser.js"></script>
  <script src="src/renderers/shared/skillCheckRules.js"></script>
  <script src="src/inlineFormatting.js"></script>
  <script src="src/markdown.js"></script>
  <script src="src/renderers/cardImage.js"></script>
  <script src="src/renderers/shared/cardMeta.js"></script>
  <script src="src/renderers/shared/cardParts.js"></script>
  <script src="src/renderers/skillChecks.js"></script>
  <script src="src/renderers/npcSections.js"></script>
  <script src="src/renderers/item.js"></script>
  <script src="src/renderers/ability.js"></script>
  <script src="src/renderers/obj.js"></script>
  <script src="src/renderers/combat.js"></script>
  <script src="src/renderers/unexpected.js"></script>
  <script src="src/renderers/std.js"></script>
  <script src="src/renderers/cardCollapse.js"></script>
  <script src="src/renderers/layout.js"></script>
  <script src="src/app.js"></script>
  <!-- Editor mode (optional layer; reader is untouched when disabled) -->
  <script src="src/editor/outline.js"></script>
  <script src="src/editor/save.js"></script>
  <script src="src/editor/cardSchemas.js"></script>
  <script src="src/editor/anchors.js"></script>
  <script src="src/editor/dragDrop.js"></script>
  <script src="src/editor/contextMenu.js"></script>
  <script src="src/editor/form.js"></script>
  <script src="src/editor/editor.js"></script>
  <!-- Printer mode (export-only; reads the rendered #page, changes nothing) -->
  <script src="src/printer/printer.js"></script>
  <!-- Debug panel (dev-only; read-only parser diagnostics, excluded from print) -->
  <script src="src/debug/diagnostics.js"></script>
  <script src="src/debug/debugPanel.js"></script>
</body>
</html>
