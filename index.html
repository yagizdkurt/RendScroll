<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RendScroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Alegreya+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/style.css">
<link rel="stylesheet" href="src/editor/editor.css">
<link rel="stylesheet" href="src/printer/printer.css">
<link rel="stylesheet" href="src/debug/debugPanel.css">
<link rel="stylesheet" href="src/campaign/campaignManager.css">
</head>
<body>
  <aside id="sidebar">
    <img class="sidebar-brand" src="src/STDImages/RendScroll2.png" alt="RendScroll">
    <button id="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true">☰</button>
    <div class="nav-section-title" id="nav-campaign-title">Campaign</div>
    <nav id="nav"></nav>
    <div class="nav-section-title" id="nav-library-title">Items</div>
    <nav id="library-nav" aria-label="Items"></nav>
    <div class="nav-section-title" id="nav-enemies-title">Enemies</div>
    <nav id="enemies-nav" aria-label="Enemies"></nav>
    <section id="options" class="options" aria-label="Options"></section>
  </aside>
  <div id="main-area">
    <header id="topbar">
      <div id="topbar-primary">
        <button id="manage-campaigns-button" class="topbar-action topbar-manage-campaigns" type="button">⚑ Manage Campaigns</button>
        <button id="new-page-button" class="topbar-action topbar-new-page" type="button">+ New Page</button>
      </div>
      <div id="topbar-tools"></div>
    </header>
    <main id="reader">
      <article id="page" class="page"></article>
    </main>
  </div>
  <script src="src/vendor/marked.min.js"></script>
  <script src="src/rendererOptions.js"></script>
  <script src="src/utils/text.js"></script>
  <script src="src/utils/dom.js"></script>
  <script src="src/utils/markdown.js"></script>
  <!-- RendScroll structural parser: canonical model consumed by the editor now
       and (Phase 2) the renderer. Must load before outline.js / cardSchemas.js. -->
  <script src="src/parser/rendscrollParser.js"></script>
  <!-- Reusable reference library (Items, …): loads standalone library files and
       resolves SourceItem-backed items / [link=Name] references. Needs the
       parser; used by app.js and the editor. -->
  <script src="src/refLibrary.js"></script>
  <script src="src/cards/shared/skillCheckRules.js"></script>
  <script src="src/inlineFormatting.js"></script>
  <script src="src/markdown.js"></script>
  <script src="src/cards/shared/cardImage.js"></script>
  <script src="src/cards/shared/StdIcons.js"></script>
  <!-- Shared dice/damage model + renderer (combat attacks and item damage) and
       the DnD 5e item-type vocabulary. Load before the card builders that use them. -->
  <script src="src/cards/shared/damageModel.js"></script>
  <script src="src/cards/shared/damageRender.js"></script>
  <script src="src/cards/shared/itemTypes.js"></script>
  <script src="src/cards/shared/cardMeta.js"></script>
  <script src="src/cards/shared/cardParts.js"></script>
  <!-- Runtime card registry: each card builder below self-registers here; app.js
       looks builders/normalizers up by type. Must load before the builders. -->
  <script src="src/cards/shared/cardRegistry.js"></script>
  <script src="src/cards/skillChecks/skillChecks.js"></script>
  <script src="src/cards/npc/npc.js"></script>
  <script src="src/cards/item/item.js"></script>
  <script src="src/cards/ability/ability.js"></script>
  <script src="src/cards/obj/obj.js"></script>
  <script src="src/cards/combat/enemyModel.js"></script>
  <script src="src/cards/combat/combat.js"></script>
  <script src="src/cards/unexpected/unexpected.js"></script>
  <script src="src/cards/narrative/narrative.js"></script>
  <script src="src/cards/std/std.js"></script>
  <script src="src/cards/picture/picture.js"></script>
  <script src="src/cards/audio/audio.js"></script>
  <script src="src/cards/shared/cardCollapse.js"></script>
  <script src="src/cards/shared/layout.js"></script>
  <!-- Multi-campaign manager: lists/creates/switches/imports/exports campaigns and
       owns the start screen. Needs refLibrary.js; used by app.js boot, so load it
       before app.js. (Export uses CampaignExporter lazily, which loads later.) -->
  <script src="src/campaign/campaignManager.js"></script>
  <script src="src/app.js"></script>
  <!-- Editor mode (optional layer; reader is untouched when disabled) -->
  <script src="src/editor/outline.js"></script>
  <script src="src/editor/save.js"></script>
  <script src="src/editor/cardSchemas.js"></script>
  <script src="src/editor/anchors.js"></script>
  <script src="src/editor/dragDrop.js"></script>
  <script src="src/editor/contextMenu.js"></script>
  <!-- Shared damage-parts editor: reused by the combat attack editor (form.js)
       and the item Damage field. Must load before form.js. -->
  <script src="src/editor/damageEditor.js"></script>
  <script src="src/editor/form.js"></script>
  <script src="src/cards/skillChecks/skillChecks.editor.js"></script>
  <!-- Item editor fields (Type picker + Damage). Registers with form.js. -->
  <script src="src/cards/item/item.editor.js"></script>
  <!-- Item Library picker: choose an existing library item (or create a new one)
       when inserting a SourceItem-backed scene Item. Needs form.js + refLibrary.js. -->
  <script src="src/editor/libraryPicker.js"></script>
  <script src="src/editor/editor.js"></script>
  <!-- Campaign package exporter: bundles scenes + referenced items/enemies +
       assets into a zip. Needs refLibrary.js + the card asset rules; used by the
       printer dropdown's "Export Package" action, so load it before printer.js. -->
  <script src="src/exporter/exporter.js"></script>
  <!-- Printer mode (export-only; reads the rendered #page, changes nothing) -->
  <script src="src/printer/printer.js"></script>
  <!-- Debug panel (dev-only; read-only parser diagnostics, excluded from print) -->
  <script src="src/debug/diagnostics.js"></script>
  <script src="src/debug/debugPanel.js"></script>
</body>
</html>
